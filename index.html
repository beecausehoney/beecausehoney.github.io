<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Minecraft Beta 1.7.3</title>
    
    <!-- Load the CheerpJ Runtime -->
    <script src="https://cjrtnc.leaningtech.com/4.3/loader.js"></script>

    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            color: #ffaa00;
            margin-bottom: 20px;
        }
        #cheerpj-display {
            border: 4px solid #555;
            border-radius: 5px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            background-color: #000;
        }
    </style>
</head>
<body>

    <h1>Minecraft Beta 1.7.3</h1>

    <!-- The display area for the Java game window -->
    <div id="cheerpj-display"></div>

    <script>
        async function runGame() {
            // 1. Ask for the player's username before the game loads
            let playerName = prompt("Enter your Minecraft username:", "Player");
            
            // If they click cancel or leave it empty, default to "Player"
            if (!playerName || playerName.trim() === "") {
                playerName = "Player";
            }

            // 2. Initialize the CheerpJ environment
            await cheerpjInit();

            // 3. Create the game canvas (Width, Height) inside the display div
            cheerpjCreateDisplay(854, 480, document.getElementById('cheerpj-display'));

            // 4. Run the file directly from your GitHub Pages root
            // Passing the user's name as an argument to load their profile
            await cheerpjRunJar("/app/b173.jar", playerName);
        }

        // Trigger the process on page load
        window.onload = runGame;
    </script>

</body>
</html>
