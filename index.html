<!DOCTYPE html>

        }

        /* Left Black Box (File List) */
        .file-list {
            background-color: #000000;

            height: 450px;
            padding: 20px;

            position: relative;
            color: #00ff00; /* Retro green text */
            border-radius: 8px;

        .file-item {
            margin-bottom: 15px;
            display: block;
            color: #00ff00;
            text-decoration: none;

        }

        .file-item:hover {
            text-decoration: underline;
        }

            margin-left: 320px;
            padding-top: 20px;
        }
    </style>
</head>
<body>

        <a href="game/minecraft.html" class="file-item">> minecraft_web.html</a>

        <a href="game/game.html" class="file-item">> game_engine.html</a>

    <div class="content">
