<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Beta 1.7.3</title>
    <!-- PRODUCTION LOADER -->
    <script src="https://cjrtnc.leaningtech.com/4.3/loader.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: monospace; }
        #game-container { width: 854px; height: 480px; margin: 20px auto; border: 4px solid #555; background: #000; }
    </style>
</head>
<body>
    <h1>Minecraft Beta 1.7.3</h1>
    <div id="game-container"></div>

    <script>
        async function runGame() {
            // 1. Get username
            let name = prompt("Username:", "Player") || "Player";

            // 2. Initialize the JVM
            await cheerpjInit();

            // 3. Mount the display to the div
            const container = document.getElementById('game-container');
            cheerpjCreateDisplay(854, 480, container);

            console.log("Launching Minecraft engine...");

            /* 
               Bypassing the manifest error.
               Class: net.minecraft.client.Minecraft
               Classpath: /app/b173.jar (Using the flat string/colon format)
            */
            await cheerpjRunMain(
                "net.minecraft.client.Minecraft", 
                "/app/b173.jar", 
                name, 
                "0"
            );
        }
        window.onload = runGame;
    </script>
</body>
</html>
